name: Build Jekyll site and deploy to GitHub Pages
on:
 push:
   branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build
        uses: actions/jekyll-build-pages@v1
      - name: Remove unused CSS
        run: |
          npm install purgecss --no-save
          npx purgecss --css ./_site/assets/css/*.css --content ./_site/**/*.html --output ./_site/assets/css/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
